name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.6.0)'
        required: true
        type: string

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pytest

    - name: Install package
      run: |
        pip install -e .

    - name: Run full test suite
      run: |
        python -m pytest tests/ -v

    - name: Verify version consistency
      run: |
        PYPROJECT_VERSION=$(grep -Po '(?<=version = ")[^"]*' pyproject.toml)
        VERSION_JSON=$(python -c "import json; print(json.load(open('version.json'))['version'])")
        echo "pyproject.toml version: $PYPROJECT_VERSION"
        echo "version.json version: $VERSION_JSON"
        if [ "$PYPROJECT_VERSION" != "$VERSION_JSON" ]; then
          echo "Version mismatch!"
          exit 1
        fi

  build:
    name: Build distribution
    needs: validate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip build twine

    - name: Build distributions
      run: |
        python -m build

    - name: Check distribution
      run: |
        twine check dist/*

    - name: Upload distributions
      uses: actions/upload-artifact@v4
      with:
        name: distributions
        path: dist/
        retention-days: 7

  create-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download distributions
      uses: actions/download-artifact@v4
      with:
        name: distributions
        path: dist/

    - name: Extract release notes
      id: release_notes
      run: |
        # Extract version from tag or input
        if [ "${{ github.event_name }}" == "push" ]; then
          VERSION="${GITHUB_REF#refs/tags/}"
        else
          VERSION="${{ inputs.version }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        # Check if milestone summary exists
        if [ -f "docs/V1.6-MILESTONE-SUMMARY.md" ]; then
          echo "Using milestone summary as release notes"
          cp docs/V1.6-MILESTONE-SUMMARY.md release_notes.md
        else
          echo "No milestone summary found, using CHANGELOG"
          if [ -f "CHANGELOG.md" ]; then
            head -50 CHANGELOG.md > release_notes.md
          else
            echo "Release $VERSION" > release_notes.md
          fi
        fi

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.release_notes.outputs.version }}
        name: Release ${{ steps.release_notes.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          dist/*.tar.gz
          dist/*.whl
